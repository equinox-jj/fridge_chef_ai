name: fridge_chef_ai
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.12.1

workspace:
  - core
  - dependencies
  - features/*

dependencies:
  flutter:
    sdk: flutter
  core:
    path: core
  dependencies:
    path: dependencies
  auth:
    path: features/auth
  onboarding:
    path: features/onboarding
  dashboard:
    path: features/dashboard
  fridge_scan:
    path: features/fridge_scan
  recipes:
    path: features/recipes
  profile:
    path: features/profile

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  go_router_builder: ^4.3.0
  build_runner: ^2.15.0
  melos: ^7.8.1

flutter:
  uses-material-design: true
  assets:
    - .env

melos:
  useRootAsPackage: true
  command:
    bootstrap:
      environment:
        sdk: ^3.12.1
        flutter: ">=1.17.0"
      dependencies:
        flutter_bloc: ^9.1.1
        go_router: ^17.3.0
        json_annotation: ^4.12.0
        camera: ^0.12.0+1
        image_picker: ^1.2.2
        permission_handler: ^12.0.3
        fpdart: ^1.2.0
        freezed_annotation: ^3.1.0
        supabase_flutter: ^2.14.1
        drift: ^2.33.0
        drift_flutter: ^0.3.0
        shared_preferences: ^2.5.5
        path: ^1.9.1
        path_provider: ^2.1.5
        flutter_native_splash: ^2.4.8
        skeletonizer: ^2.1.3
        logger: ^2.7.0
        flutter_local_notifications: ^22.0.0
        intl: ^0.20.2
        get_it: ^9.2.1
        cached_network_image: ^3.4.1
        flutter_dotenv: ^6.0.1
        firebase_core: ^4.10.0
        firebase_crashlytics: ^5.2.3
        firebase_analytics: ^12.4.2
        firebase_ai: ^3.12.2
      dev_dependencies:
        flutter_lints: ^6.0.0
        go_router_builder: ^4.3.0
        build_runner: ^2.15.0
        json_serializable: ^6.14.0
        freezed: ^3.2.5
        drift_dev: ^2.33.0
        melos: ^7.8.1
  scripts:
    format:
      name: Format code
      description: Run dart format . on every package
      steps:
        - melos exec -- dart format .
        - melos exec -- dart fix --apply
      packageFilters:
        dirExists: lib-
    generate:
      name: Build generated files
      description: Generate *.g.dart / *.freezed.dart files
      run: melos exec -c 1 --depends-on build_runner -- dart run build_runner build --delete-conflicting-outputs
      packageFilters:
        dependsOn: build_runner
